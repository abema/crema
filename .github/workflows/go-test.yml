name: go-test

permissions:
  contents: read
  code-quality: write

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GOPRIVATE: "github.com/abema/crema"

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - go-version: "1.25"
            coverage: true
          - go-version: "1.26"
            coverage: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: v1-${{ runner.os }}-go-test-${{ matrix.go-version }}-${{ hashFiles('go.work.sum', '**/go.sum') }}
          restore-keys: |
            v1-${{ runner.os }}-go-test-${{ matrix.go-version }}-
      - name: setup-git
        run: git config --global url."https://github-actions:${{ secrets.GITHUB_TOKEN }}@github.com/abema/crema".insteadOf "https://github.com/abema/crema"
      - name: Go generate (root) and verify clean
        run: |
          go generate
          git diff --exit-code
      - name: Go test
        id: test
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            echo "coverage=true" >> "$GITHUB_OUTPUT"
            go test -v -coverprofile=coverage.out ./... $(find ./ext/ -type d -mindepth 1 -maxdepth 1 | sed 's|$|/...|' | paste -sd ' ' -)
            go tool cover -func=coverage.out
          else
            echo "coverage=false" >> "$GITHUB_OUTPUT"
            go test -v ./... $(find ./ext/ -type d -mindepth 1 -maxdepth 1 | sed 's|$|/...|' | paste -sd ' ' -)
          fi
      - name: Generate Cobertura coverage report
        if: steps.test.outputs.coverage == 'true'
        run: |
          GOWORK=off go -C tools build -mod=readonly -o "$RUNNER_TEMP/gocover-cobertura" github.com/boumenot/gocover-cobertura
          "$RUNNER_TEMP/gocover-cobertura" -path "$GITHUB_WORKSPACE" < coverage.out > coverage.xml
      - name: Upload coverage report
        if: steps.test.outputs.coverage == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: coverage.xml
          language: Go
          label: code-coverage/go-test

  go-test-aggregate:
    name: go-test-aggregate
    runs-on: ubuntu-latest
    needs: go-test
    if: always()
    steps:
      - name: Check matrix result
        run: test "${{ needs.go-test.result }}" = "success"
